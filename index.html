<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POO con Canvas</title>
  <link rel="icon" type="image/png" href="./assets/img/bolitas.png">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<!-- 🔥 BODY BIEN ABIERTO Y CERRADO -->
<body style="background: url('./assets/img/fondooscuro.jpg') no-repeat center center/cover; min-height: 100vh; color: white;">

  <!-- NAVBAR -->
 <nav class="navbar navbar-expand-lg glass-navbar">
  <div class="container-fluid">

    <span class="navbar-brand text-white fw-bold">
      Canvas Animation App
    </span>

    <span class="text-white small">
      Simulación de animaciones con HTML5 Canvas
    </span>

  </div>
</nav>

  <div class="container py-4">

<!-- CONTROLES HORIZONTALES -->
<div class="glass-card dark-panel p-3 mb-3 shadow-sm">

  <!-- TITULO -->
  <div class="text-center mb-2">
    <h6 class="fw-bold mb-0">Controles</h6>
    <small class="text-muted">
      Configure el efecto, la cantidad de círculos y el tamaño del lienzo
    </small>
  </div>

  <div class="row align-items-end g-3 text-center justify-content-center">

    <!-- EFECTO -->
    <div class="col-md-3">
      <label class="form-label">Efecto</label>
      <select id="efecto" class="form-select text-center">
        <option value="explosion">Explosión</option>
        <option value="lluvia">Lluvia</option>
        <option value="asteroides">Asteroides</option>
        <option value="superrebote">Súper rebote</option>
      </select>
    </div>

    <!-- CANTIDAD -->
    <div class="col-md-2">
      <label class="form-label">Cantidad</label>
      <input type="number" id="cantidad" class="form-control text-center" value="10">
    </div>

    <!-- ANCHO -->
    <div class="col-md-2">
      <label class="form-label">Ancho</label>
      <input type="number" id="anchoCanvas" class="form-control text-center" value="600">
    </div>

    <!-- ALTO -->
    <div class="col-md-2">
      <label class="form-label">Alto</label>
      <input type="number" id="altoCanvas" class="form-control text-center" value="400">
    </div>

    <!-- BOTÓN -->
    <div class="col-md-2 d-grid">
      <button class="btn btn-dark-custom" onclick="aplicarCambios()">
        Aplicar
      </button>
    </div>

  </div>

</div>
</div>

    <!-- CANVAS -->
    <div class="glass-card p-3 text-center">
      <canvas id="canvas"></canvas>
    </div>

  </div>

  <footer class="glass-footer text-center py-3 mt-4">


  <div class="small">
    Simulación de animaciones usando HTML5 Canvas y JavaScript
  </div>

  <div class="small">
    Desarrollado por <strong>Jesus Roberto Hernandez Benitez</strong>
  </div>

  <div class="small">
    Ingeniería en Sistemas | 2026
  </div>

</footer>

  <script src="./assets/js/main_rebote.js"></script>

</body>
</html>
