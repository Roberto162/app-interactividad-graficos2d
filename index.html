<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POO con Canvas</title>
  <link rel="icon" type="image/png" href="./assets/img/bolitas.png">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<!-- 🔥 BODY BIEN ABIERTO Y CERRADO -->
<body style="background: url('./assets/img/fondooscuro.jpg') no-repeat center center/cover; min-height: 100vh; color: white;">

 <nav class="navbar navbar-expand-lg navbar-dark game-navbar">

  <div class="container">

    <span class="navbar-brand fw-bold">
      CANVAS GAME ENGINE
    </span>

    <div class="text-end">

      <div class="text-white fw-bold">
        Jesus Roberto Hernandez Benitez
      </div>

      <small class="text-info">
        Ingeniería en Sistemas | 2026
      </small>

    </div>

  </div>

</nav>

  <div class="container py-4">

   <div class="game-panel container-fluid p-3 mb-3">

    <div class="row align-items-center text-center">

        <div class="col-md-3">

            <h5 class="text-info fw-bold m-0">
                🎮 Nivel <span id="nivel">1</span>
            </h5>

        </div>

        <div class="col-md-3">

            <span id="contador" class="text-light">
                Eliminados: 0 / 10
            </span>

        </div>

        <div class="col-md-3">

            <span id="porcentaje" class="text-warning">
                0%
            </span>

        </div>

        <div class="col-md-3">

            <button id="btnNivel"
                    class="btn btn-game disabled"
                    onclick="siguienteNivel()">

                🔒 Siguiente Nivel

            </button>

        </div>

    </div>

   </div>
</div>

    <!-- CANVAS -->
<div class="game-canvas-container text-center">

    <canvas id="canvas"></canvas>

</div>

  </div>

  <footer class="game-footer text-center py-4 mt-4">

  <h6 class="fw-bold text-info">
    🎮 Canvas Animation Game
  </h6>

  <div class="small">
    Simulación de objetos 2D con HTML5 Canvas y JavaScript
  </div>

  <div class="small mt-2">
    Desarrollado por <strong>Jesus Roberto Hernandez Benitez</strong>
  </div>

  <div class="small">
    Ingeniería en Sistemas Computacionales
  </div>

  <div class="small">
    2026
  </div>

</footer>

  <script  src="./assets/js/main_rebote.js"></script>
